# ansible/playbooks/configure-server.yml
---
- name: Configure NotesApp Server
  hosts: notesapp
  become: true

  vars:
    image: mosesekerin/notesapp:latest

  tasks:

    - name: Update all system packages
      dnf:
        name: "*"
        state: latest
        update_cache: true

    - name: Install Docker
      dnf:
        name: docker
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Create log file
      file:
        path: /var/log/notesapp.log
        state: touch
        mode: "0644"

    - name: Create persistent storage file
      file:
        path: /opt/notesapp/notes.json
        state: touch
        mode: "0644"

    - name: Copy systemd service file
      copy:
        src: ../../systemd/notesapp.service
        dest: /etc/systemd/system/notesapp.service
        mode: "0644"

    - name: Pull Docker image from Docker Hub
      docker_image:
        name: "{{ image }}"
        source: pull

    - name: Reload systemd daemon
      systemd:
        daemon_reload: true

    - name: Enable and start notesapp service
      systemd:
        name: notesapp
        state: started
        enabled: true